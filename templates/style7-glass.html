<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=render.html?style=glass">
  <title>Redirecting to render.html?style=glass</title>
  <script>
    // Preserve query parameters during redirect
    const params = new URLSearchParams(window.location.search);
    params.set("style", "glass");
    window.location.replace("render.html?" + params.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="render.html?style=glass">render.html?style=glass</a>...</p>
</body>
</html>
