<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=render.html?style=ramadan-plum">
  <title>Redirecting to render.html?style=ramadan-plum</title>
  <script>
    // Preserve query parameters during redirect
    const params = new URLSearchParams(window.location.search);
    params.set("style", "ramadan-plum");
    window.location.replace("render.html?" + params.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="render.html?style=ramadan-plum">render.html?style=ramadan-plum</a>...</p>
</body>
</html>
