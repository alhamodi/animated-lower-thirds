<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Lower Third - بسيط (Minimalist)</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    /* ═══════════════════════════════════════
       STYLE 16: بسيط (Minimalist)
       Ultra Minimal Glass | Perfect for Montage
    ═══════════════════════════════════════ */

    body { background: transparent; }

    /* Main panel - transparent/glass */
    .lt-panel {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 480px;
      max-width: 800px; /* Allow wider for long text */
      min-height: 80px;
      padding: 16px 32px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.03) 0%,
        rgba(255,255,255,0.01) 100%
      );
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      transform: translateY(40px);
      opacity: 0;
    }

    .lt-entering .lt-panel {
      animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .lt-exiting .lt-panel {
      animation: fadeOut 0.4s ease-in-out forwards;
    }

    /* Minimal accent line on the side */
    .lt-panel::after {
      content: '';
      position: absolute;
      right: 0;
      top: 15%;
      bottom: 15%;
      width: 2px;
      background: var(--white);
      opacity: 0.6;
      border-radius: 2px;
    }

    /* Text area */
    .lt-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .lt-name {
      font-family: var(--font-arabic);
      font-size: 2.4rem;
      font-weight: 300; /* Thin modern weight */
      color: var(--white);
      line-height: 1.1;
      letter-spacing: 0.02em;
      opacity: 0;
    }
    .lt-entering .lt-name {
      animation: fadeInUp 0.5s ease 0.2s forwards;
    }

    .lt-title {
      font-family: var(--font-arabic);
      font-size: 1.2rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.04em;
      opacity: 0;
    }
    .lt-entering .lt-title {
      animation: fadeInUp 0.5s ease 0.3s forwards;
    }

    .lt-meta-row {
      margin-top: 8px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      font-weight: 300;
      opacity: 0;
    }
    .lt-entering .lt-meta-row {
      animation: fadeInUp 0.5s ease 0.4s forwards;
    }

    /* Keyframes */
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>
  <div class="lower-third-wrapper lt-hidden" id="ltWrapper">
    <div class="lt-panel">
      <!-- Text content -->
      <div class="lt-text-content lt-content">
        <div class="lt-name">عنوان الكلمة / الدرس</div>
        <div class="lt-title">اسم الشيخ / المحاضر</div>
        <div class="lt-meta-row">
          <span class="lt-location">المكان</span>
          <span class="lt-separator" style="margin: 0 8px; opacity: 0.5;">|</span>
          <span class="lt-date">التاريخ</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/controller.js"></script>
</body>
</html>
