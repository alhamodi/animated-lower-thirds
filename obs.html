<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>OBS Dynamic Lower Third Source</title>
  <meta name="description" content="مخزن عرض العارضات السفلية لبرنامج OBS Studio. يعمل بالتزامن مع لوحة التحكم لتحديث البيانات والأنماط بشكل لحظي.">
  <meta property="og:title" content="OBS Dynamic Lower Third Source">
  <meta property="og:description" content="مخزن عرض العارضات السفلية لبرنامج OBS Studio. يعمل بالتزامن مع لوحة التحكم لتحديث البيانات والأنماط بشكل لحظي.">
  <meta property="og:type" content="website">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <iframe id="ltFrame" src="about:blank"></iframe>

  <script>
    const STYLE_MAP = {
      1: 'style1-emerald.html',
      2: 'style2-royal.html',
      3: 'style3-modern.html',
      4: 'style4-fajr.html',
      5: 'style5-silver.html',
      6: 'style6-heritage.html',
      7: 'style7-glass.html',
      8: 'style8-saudi.html',
      9: 'style9-kufic.html',
      10: 'style10-gold.html',
      11: 'style11-midnight.html',
      12: 'style12-marble.html',
      13: 'style13-ramadan-green.html',
      14: 'style14-ramadan-plum.html',
      15: 'style15-dynamic.html',
      16: 'style16-minimalist.html',
      17: 'style17-islamic-3d.html',
      18: 'style18-liquid-chrome.html',
      19: 'style19-liquid-neon.html',
      20: 'style20-liquid-organic-islamic.html',
      21: 'style21-news-ticker.html',
      22: 'style22-andalusian-royal.html',
      23: 'style23-ramadan-eid.html',
      24: 'style24-golden-stroke.html',
      25: 'style25-master-ticker.html',
      26: 'style26-cyber-mosaic.html'
    };

    const STYLE_THEME_MAP = {
      1: 'emerald',
      2: 'royal',
      3: 'modern',
      4: 'fajr',
      5: 'silver',
      6: 'heritage',
      7: 'glass',
      8: 'saudi',
      9: 'kufic',
      10: 'gold',
      11: 'midnight',
      12: 'marble',
      13: 'ramadan-green',
      14: 'ramadan-plum',
      15: 'dynamic',
      16: 'minimalist',
      17: 'islamic-3d',
      18: 'liquid-chrome',
      19: 'liquid-neon',
      20: 'liquid-organic-islamic',
      21: 'news-ticker',
      22: 'andalusian-royal',
      23: 'ramadan-eid',
      24: 'golden-stroke',
      25: 'master-ticker',
      26: 'cyber-mosaic'
    };

    const frame = document.getElementById('ltFrame');
    
    let lastCmdString = '';
    let lastSeq = 0;
    const apiOrigin = window.location.protocol.startsWith('http') ? window.location.origin : 'http://localhost:8080';
    
    // Parse initial URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const styleIdParam = urlParams.get('styleId');
    let currentStyle = urlParams.get('style') || 'islamic-3d';
    if (styleIdParam && STYLE_THEME_MAP[styleIdParam]) {
      currentStyle = STYLE_THEME_MAP[styleIdParam];
    }
    
    // Build initial URL using polymorphic render.html
    const initialUrl = new URL('templates/render.html', window.location.href);
    initialUrl.searchParams.set('style', currentStyle);
    urlParams.forEach((value, key) => {
      if (key !== 'styleFile') {
        initialUrl.searchParams.set(key, value);
      }
    });
    if (!initialUrl.searchParams.has('autostart')) {
      initialUrl.searchParams.set('autostart', 'false');
    }
    frame.src = initialUrl.toString();
    
    // Listen to control panel commands
    const channel = new BroadcastChannel('lt-control');
    
    function handleCmd(cmd) {
      const { seq, ...comparisonCmd } = cmd;
      lastCmdString = JSON.stringify(comparisonCmd);
      if (seq) lastSeq = seq;

      // 1. Handle theme style changes
      let targetStyle = cmd.style;
      if (cmd.styleId && STYLE_THEME_MAP[cmd.styleId]) {
        targetStyle = STYLE_THEME_MAP[cmd.styleId];
      }

      if (cmd.type === 'change-style' && targetStyle && targetStyle !== currentStyle) {
        currentStyle = targetStyle;
        // Try to hot-swap via postMessage first
        try {
          frame.contentWindow.postMessage({ type: 'change-style', style: targetStyle }, '*');
        } catch(e) {}
        // Also try direct themeRouter access
        try {
          if (frame.contentWindow && frame.contentWindow.themeRouter) {
            frame.contentWindow.themeRouter.applyTheme(targetStyle);
          }
        } catch(e) {}
        return;
      }

      if (cmd.type === 'change-style') return;
      
      // 2. Forward show/update/hide commands directly to the iframe's LT controller
      // Try direct JS access first (works when same origin)
      try {
        if (frame.contentWindow && frame.contentWindow.LT && frame.contentWindow.document.readyState === 'complete') {
          frame.contentWindow.LT._handleCommand(cmd);
        }
      } catch (err) {
        // Cross-origin or LT not ready — iframe's own API polling (every 250ms) will handle it
      }
      
      // 3. Also send via postMessage as a reliable backup
      try {
        frame.contentWindow.postMessage({ ...cmd, _source: 'obs' }, '*');
      } catch(e) {}
      
      // Note: We do NOT reload the iframe here. The iframe's own API polling handles any missed commands.
    }
    
    channel.onmessage = (e) => handleCmd(e.data);
    
    window.addEventListener('storage', (e) => {
      if (e.key === 'lt-cmd' && e.newValue) {
        try {
          handleCmd(JSON.parse(e.newValue));
        } catch (err) {}
      }
    });

    // API Polling (bulletproof fallback for OBS isolated sources)
    const apiInterval = setInterval(() => {
      fetch(`${apiOrigin}/api/command?t=${Date.now()}`)
        .then(res => res.json())
        .then(cmd => {
          if (cmd && cmd.type) {
            const { seq, ...comparisonCmd } = cmd;
            const cmdString = JSON.stringify(comparisonCmd);
            if (cmdString !== lastCmdString || (seq && seq !== lastSeq)) {
              lastCmdString = cmdString;
              lastSeq = seq;
              handleCmd(cmd);
            }
          }
        })
        .catch(() => {});
    }, 250);

    // Unload listener to prevent memory leaks
    window.addEventListener('unload', () => {
      if (apiInterval) {
        clearInterval(apiInterval);
      }
      if (channel) {
        channel.close();
      }
    });
  </script>
</body>
</html>
