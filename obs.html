<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>OBS Dynamic Lower Third Source</title>
  <meta name="description" content="مخزن عرض العارضات السفلية لبرنامج OBS Studio. يعمل بالتزامن مع لوحة التحكم لتحديث البيانات والأنماط بشكل لحظي.">
  <meta property="og:title" content="OBS Dynamic Lower Third Source">
  <meta property="og:description" content="مخزن عرض العارضات السفلية لبرنامج OBS Studio. يعمل بالتزامن مع لوحة التحكم لتحديث البيانات والأنماط بشكل لحظي.">
  <meta property="og:type" content="website">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <iframe id="ltFrame" src=""></iframe>

  <script>
    const frame = document.getElementById('ltFrame');
    
    // Parse initial URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    let currentStyle = urlParams.get('style') || 'emerald';
    
    // Build initial URL using polymorphic render.html
    const initialUrl = new URL('templates/render.html', window.location.href);
    initialUrl.searchParams.set('style', currentStyle);
    urlParams.forEach((value, key) => {
      if (key !== 'styleFile') {
        initialUrl.searchParams.set(key, value);
      }
    });
    if (!initialUrl.searchParams.has('autostart')) {
      initialUrl.searchParams.set('autostart', 'false');
    }
    frame.src = initialUrl.toString();
    
    // Listen to control panel commands
    const channel = new BroadcastChannel('lt-control');
    
    function handleCmd(cmd) {
      // 1. Handle theme style changes (either via explicit change-style command or style parameter in show/update)
      const targetStyle = cmd.style || (cmd.styleFile ? cmd.styleFile.replace('style', '').split('-')[1]?.replace('.html', '') : null);
      if (targetStyle && targetStyle !== currentStyle) {
        currentStyle = targetStyle;
        try {
          if (frame.contentWindow && frame.contentWindow.themeRouter) {
            frame.contentWindow.themeRouter.applyTheme(targetStyle);
          }
        } catch (e) {
          // Fallback: reload iframe
          const url = new URL(frame.src || 'templates/render.html', window.location.href);
          url.searchParams.set('style', targetStyle);
          url.searchParams.set('autostart', 'false');
          url.searchParams.set('t', Date.now());
          frame.src = url.toString();
        }
      }

      if (cmd.type === 'change-style') {
        return;
      }
      
      // Forward commands directly to iframe's controller
      let ltReady = false;
      try {
        if (frame.contentWindow && frame.contentWindow.LT) {
          frame.contentWindow.LT._handleCommand(cmd);
          ltReady = true;
        }
      } catch (err) {
        console.warn('LT access error:', err);
      }
      
      if (!ltReady) {
        const url = new URL(frame.src || window.location.href);
        Object.keys(cmd).forEach(k => {
          if (k !== 'type' && cmd[k] !== undefined && cmd[k] !== '') {
            url.searchParams.set(k, cmd[k]);
          }
        });
        if (cmd.type === 'show') {
          url.searchParams.set('autostart', 'true');
        } else if (cmd.type === 'hide') {
          url.searchParams.set('autostart', 'false');
        }
        url.searchParams.set('t', Date.now());
        frame.src = url.toString();
      }
    }
    
    channel.onmessage = (e) => handleCmd(e.data);
    
    window.addEventListener('storage', (e) => {
      if (e.key === 'lt-cmd' && e.newValue) {
        try {
          handleCmd(JSON.parse(e.newValue));
        } catch (err) {}
      }
    });

    // 3. API Polling (100% Bulletproof for OBS isolated sources)
    let lastCmdString = '';
    setInterval(() => {
      fetch('http://localhost:8080/api/command')
        .then(res => res.json())
        .then(cmd => {
          const cmdString = JSON.stringify(cmd);
          if (cmd && cmd.type && cmdString !== lastCmdString) {
            lastCmdString = cmdString;
            handleCmd(cmd);
          }
        })
        .catch(() => {});
    }, 250);
  </script>
</body>
</html>
